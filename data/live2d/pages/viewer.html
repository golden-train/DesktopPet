<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/src/library/live2d.min.js"></script>
  <script src="/src/library/live2dcubismcore.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live2D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent !important;
    }
    canvas {
      width: 100%; height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="live2d-canvas"></canvas>
  <script type="module">
    // ── 从 URL 参数获取模型名称 ─────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const modelName = params.get('model') || 'Firefly';
    const modelFile = modelName + '/' + modelName + '.model3.json';

    // ── Live2D SDK 初始化 ──────────────────────────────────
    const canvas = document.getElementById('live2d-canvas');
    const app = new Live2DApp(canvas);

    async function loadModel() {
      try {
        await app.loadModel(modelFile);
        console.log('Live2D model loaded:', modelName);
      } catch (err) {
        console.error('Failed to load model:', err);
      }
    }

    // 等待 DOM 和 SDK 就绪
    if (document.readyState === 'complete') {
      loadModel();
    } else {
      window.addEventListener('load', loadModel);
    }
  </script>
</body>
</html>
